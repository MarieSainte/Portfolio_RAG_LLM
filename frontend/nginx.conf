server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API : /api/* -> backend FastAPI (le slash final retire le préfixe /api)
    # ex : /api/chat -> http://backend:8000/chat
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # SPA : toutes les routes inconnues renvoient index.html (routing Angular)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache long pour les assets versionnés (hash dans le nom de fichier)
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
