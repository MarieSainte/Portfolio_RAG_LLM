# Fluentd : reçoit les logs des conteneurs (driver Docker "fluentd"),
# parse le JSON applicatif et pousse vers Loki (interrogé ensuite par Grafana).

<source>
  @type forward
  port 24224
  bind 0.0.0.0
</source>

# Le driver fluentd de Docker encapsule chaque ligne dans le champ "log".
# Nos logs applicatifs étant déjà en JSON, on parse ce champ pour récupérer
# level / logger / message comme champs de premier niveau.
<filter backend.**>
  @type parser
  key_name log
  reserve_data true
  emit_invalid_record_to_error false
  <parse>
    @type json
  </parse>
</filter>

# Logs du backend -> Loki, avec des labels exploitables dans Grafana.
<match backend.**>
  @type loki
  url "http://loki:3100"
  extra_labels {"job":"backend"}
  line_format json
  <label>
    level
    logger
  </label>
  <buffer>
    flush_interval 2s
    retry_max_times 5
  </buffer>
</match>

# Filet de sécurité : tout autre flux part aussi vers Loki (job=docker).
<match **>
  @type loki
  url "http://loki:3100"
  extra_labels {"job":"docker"}
  line_format json
  <buffer>
    flush_interval 2s
  </buffer>
</match>
