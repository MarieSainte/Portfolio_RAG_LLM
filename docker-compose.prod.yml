# Déploiement serveur : images pré-buildées par la CI (ghcr.io), aucun build local.
# Utilisé par le workflow .github/workflows/deploy.yml
# IMAGE_TAG (défini dans .env par la CI) épingle la version déployée -> rollback possible.
# Lancement manuel : IMAGE_TAG=<sha> docker compose -f docker-compose.prod.yml up -d

services:
  chromadb:
    image: chromadb/chroma:0.4.24
    container_name: portfolio_chromadb
    restart: unless-stopped
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=FALSE
    networks:
      - portfolio_net
    deploy:
      resources:
        limits:
          memory: 1500m

  backend:
    image: ghcr.io/mariesainte/portfolio-backend:${IMAGE_TAG:-latest}
    container_name: portfolio_backend
    restart: unless-stopped
    depends_on:
      chromadb:
        condition: service_started
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - MISTRAL_MODEL=${MISTRAL_MODEL:-mistral-medium-latest}
      - CHAT_RATE_LIMIT=${CHAT_RATE_LIMIT:-10/minute}
      # Découpage des documents (expérimentation de chunk size). L'index est
      # reconstruit à chaque déploiement (voir deploy.yml : down -v).
      - CHUNK_SIZE=${CHUNK_SIZE:-500}
      - CHUNK_OVERLAP=${CHUNK_OVERLAP:-50}
      # Journalisation des interactions (SQLite + FTS5). ADMIN_TOKEN vide -> endpoint
      # d'admin désactivé. Le fichier vit dans /app/data (bind mount ci-dessous).
      - INTERACTIONS_DB_PATH=/app/data/interactions.db
      - ADMIN_TOKEN=${ADMIN_TOKEN:-}
      - LANGSMITH_TRACING=${LANGSMITH_TRACING:-false}
      - LANGSMITH_ENDPOINT=${LANGSMITH_ENDPOINT:-https://api.smith.langchain.com}
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY:-}
      - LANGSMITH_PROJECT=${LANGSMITH_PROJECT:-portfolio-chatbot}
    volumes:
      # Bind mount (pas un volume nommé) : survit au `down -v` du déploiement, donc le
      # journal des interactions n'est PAS effacé quand on reconstruit l'index Chroma.
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    networks:
      - portfolio_net
    deploy:
      resources:
        limits:
          memory: 3g

  frontend:
    image: ghcr.io/mariesainte/portfolio-frontend:${IMAGE_TAG:-latest}
    container_name: portfolio_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    # Seul port exposé : le frontend nginx sert l'app et proxifie /api vers le backend
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - portfolio_net
    deploy:
      resources:
        limits:
          memory: 256m

networks:
  portfolio_net:
    driver: bridge

volumes:
  chroma_data:
