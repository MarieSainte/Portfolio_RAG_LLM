# Workflow réutilisable : gate qualité RAG (Ragas)
name: Reusable — Ragas eval

on:
  workflow_call:

jobs:
  ragas-eval:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    # ChromaDB identique à la prod, exposé sur localhost:8000
    services:
      chromadb:
        image: chromadb/chroma:0.4.24
        ports:
          - 8000:8000

    env:
      CHROMA_HOST: localhost
      CHROMA_PORT: "8000"
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
      RAGAS_JUDGE_MODEL: mistral-large-latest
      # Tracing LangSmith des runs d'éval (activé seulement si le secret existe)
      LANGSMITH_TRACING: ${{ secrets.LANGSMITH_API_KEY != '' && 'true' || 'false' }}
      LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
      LANGSMITH_PROJECT: portfolio-chatbot-ci

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-eval.txt

      - name: Cache modèles Hugging Face (embeddings + reranker)
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ hashFiles('backend/app/core/config.py') }}
          restore-keys: hf-models-

      - name: Install dependencies (torch CPU)
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements-eval.txt

      - name: Wait for ChromaDB
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/api/v1/heartbeat > /dev/null; then
              echo "ChromaDB prêt."
              exit 0
            fi
            sleep 2
          done
          echo "ChromaDB indisponible après 60s." && exit 1

      - name: Run Ragas evaluation (gate qualité)
        run: python -m evals.run_ragas

      - name: Upload detailed results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ragas-results
          path: backend/evals/ragas_results.csv
          if-no-files-found: ignore
