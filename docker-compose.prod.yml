# Déploiement serveur : images pré-buildées par la CI (ghcr.io), aucun build local.
# Utilisé par le workflow .github/workflows/deploy.yml
# IMAGE_TAG (défini dans .env par la CI) épingle la version déployée -> rollback possible.
# Lancement manuel : IMAGE_TAG=<sha> docker compose -f docker-compose.prod.yml up -d

services:
  chromadb:
    image: chromadb/chroma:0.4.24
    container_name: portfolio_chromadb
    restart: unless-stopped
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=FALSE
    networks:
      - portfolio_net
    deploy:
      resources:
        limits:
          memory: 1500m

  backend:
    image: ghcr.io/mariesainte/portfolio-backend:${IMAGE_TAG:-latest}
    container_name: portfolio_backend
    restart: unless-stopped
    depends_on:
      chromadb:
        condition: service_started
      fluentd:
        condition: service_started
    # Logs (stdout JSON) -> Fluentd -> Loki -> Grafana. fluentd-async : le backend
    # ne bloque jamais si Fluentd n'est pas encore prêt (bufferise et réessaie).
    logging:
      driver: fluentd
      options:
        fluentd-address: "localhost:24224"
        fluentd-async: "true"
        tag: "backend"
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - MISTRAL_MODEL=${MISTRAL_MODEL:-mistral-medium-latest}
      - CHAT_RATE_LIMIT=${CHAT_RATE_LIMIT:-10/minute}
      # Découpage des documents (expérimentation de chunk size). L'index est
      # reconstruit à chaque déploiement (voir deploy.yml : down -v).
      - CHUNK_SIZE=${CHUNK_SIZE:-500}
      - CHUNK_OVERLAP=${CHUNK_OVERLAP:-50}
      # Journalisation des interactions (SQLite + FTS5). ADMIN_TOKEN vide -> endpoint
      # d'admin désactivé. Le fichier vit dans /app/data (bind mount ci-dessous).
      - INTERACTIONS_DB_PATH=/app/data/interactions.db
      - ADMIN_TOKEN=${ADMIN_TOKEN:-}
      - LANGSMITH_TRACING=${LANGSMITH_TRACING:-false}
      - LANGSMITH_ENDPOINT=${LANGSMITH_ENDPOINT:-https://api.smith.langchain.com}
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY:-}
      - LANGSMITH_PROJECT=${LANGSMITH_PROJECT:-portfolio-chatbot}
    volumes:
      # Bind mount (pas un volume nommé) : survit au `down -v` du déploiement, donc le
      # journal des interactions n'est PAS effacé quand on reconstruit l'index Chroma.
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    networks:
      - portfolio_net
    deploy:
      resources:
        limits:
          memory: 3g

  frontend:
    image: ghcr.io/mariesainte/portfolio-frontend:${IMAGE_TAG:-latest}
    container_name: portfolio_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    # Seul port exposé : le frontend nginx sert l'app et proxifie /api vers le backend
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - portfolio_net
    deploy:
      resources:
        limits:
          memory: 256m

  # --- Stack d'observabilité des logs : Fluentd -> Loki -> Grafana ---
  # Image fluentd (plugin Loki) buildée et publiée par la CI, comme backend/frontend.

  fluentd:
    image: ghcr.io/mariesainte/portfolio-fluentd:${IMAGE_TAG:-latest}
    container_name: portfolio_fluentd
    restart: unless-stopped
    volumes:
      - ./logging/fluentd/conf:/fluentd/etc:ro
    # Écoute uniquement sur la loopback du serveur : le driver de logs Docker s'y
    # connecte depuis l'hôte, jamais exposé publiquement.
    ports:
      - "127.0.0.1:24224:24224"
      - "127.0.0.1:24224:24224/udp"
    depends_on:
      - loki
    networks:
      - portfolio_net
    deploy:
      resources:
        limits:
          memory: 256m

  loki:
    image: grafana/loki:2.9.8
    container_name: portfolio_loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yml
    volumes:
      - ./logging/loki/loki-config.yml:/etc/loki/local-config.yml:ro
      - loki_data:/loki
    networks:
      - portfolio_net
    deploy:
      resources:
        limits:
          memory: 512m

  grafana:
    image: grafana/grafana:11.1.0
    container_name: portfolio_grafana
    restart: unless-stopped
    environment:
      # Pas d'accès anonyme en prod : login admin obligatoire (mot de passe en secret).
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    # Publié sur la loopback du serveur uniquement : accès via tunnel SSH
    # (ssh -L 3000:localhost:3000 serveur), aucune surface publique.
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./logging/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./logging/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - loki
    networks:
      - portfolio_net
    deploy:
      resources:
        limits:
          memory: 256m

networks:
  portfolio_net:
    driver: bridge

volumes:
  chroma_data:
  # Historique d'observabilité : préservé entre déploiements (voir deploy.yml,
  # seul chroma_data est reconstruit).
  loki_data:
  grafana_data:
