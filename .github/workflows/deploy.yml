name: Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "logging/**"
      - "docker-compose.prod.yml"
      - ".github/workflows/deploy.yml"
      - ".github/workflows/_tests.yml"
      - ".github/workflows/_ragas.yml"
  workflow_dispatch:
    inputs:
      rollback_sha:
        description: "SHA d'une image déjà publiée à redéployer (rollback). Vide = build normal."
        required: false
        default: ""

# Un seul déploiement à la fois ; annule un run précédent encore en cours
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_BACKEND: ghcr.io/mariesainte/portfolio-backend
  IMAGE_FRONTEND: ghcr.io/mariesainte/portfolio-frontend
  IMAGE_FLUENTD: ghcr.io/mariesainte/portfolio-fluentd

jobs:
  # --- Gates qualité (sautées en cas de rollback) ---
  tests:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.rollback_sha == '' }}
    uses: ./.github/workflows/_tests.yml
    secrets: inherit

  frontend:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.rollback_sha == '' }}
    uses: ./.github/workflows/_frontend.yml
    secrets: inherit

  # Gate qualité RAG (Ragas) : bloque le déploiement si un score passe sous son seuil.
  eval:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.rollback_sha == '' }}
    needs: tests
    uses: ./.github/workflows/_ragas.yml
    secrets: inherit

  # --- Build + push des images (sauté en cas de rollback) ---
  build-push:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.rollback_sha == '' }}
    needs: [eval, frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push fluentd (collecteur de logs -> Loki)
        uses: docker/build-push-action@v6
        with:
          context: ./logging/fluentd
          push: true
          tags: |
            ${{ env.IMAGE_FLUENTD }}:latest
            ${{ env.IMAGE_FLUENTD }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # --- Déploiement (image épinglée par SHA, ou rollback_sha) ---
  deploy:
    needs: build-push
    # Déploie si le build a réussi, OU si c'est un rollback explicite (build volontairement sauté).
    # Ne déploie PAS quand le build est sauté à cause d'un gate qualité en échec.
    if: ${{ always() && (needs.build-push.result == 'success' || (github.event_name == 'workflow_dispatch' && inputs.rollback_sha != '')) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      IMAGE_TAG: ${{ inputs.rollback_sha || github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy

      - name: Prepare .env
        run: |
          cat > .env.deploy <<EOF
          IMAGE_TAG=${{ env.IMAGE_TAG }}
          MISTRAL_API_KEY=${{ secrets.MISTRAL_API_KEY }}
          MISTRAL_MODEL=mistral-small-latest
          CHAT_RATE_LIMIT=10/minute
          CHUNK_SIZE=${{ vars.CHUNK_SIZE || '500' }}
          CHUNK_OVERLAP=${{ vars.CHUNK_OVERLAP || '50' }}
          ADMIN_TOKEN=${{ secrets.ADMIN_TOKEN }}
          LANGSMITH_TRACING=${{ secrets.LANGSMITH_API_KEY != '' && 'true' || 'false' }}
          LANGSMITH_API_KEY=${{ secrets.LANGSMITH_API_KEY }}
          LANGSMITH_PROJECT=portfolio-chatbot
          GRAFANA_ADMIN_USER=${{ vars.GRAFANA_ADMIN_USER || 'admin' }}
          GRAFANA_ADMIN_PASSWORD=${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          EOF

      - name: Copy files to server
        run: |
          SSH_OPTS="-i ~/.ssh/id_deploy -o StrictHostKeyChecking=no"
          ssh $SSH_OPTS ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "mkdir -p ~/portfolio"
          scp $SSH_OPTS docker-compose.prod.yml ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:~/portfolio/docker-compose.prod.yml
          scp $SSH_OPTS .env.deploy ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:~/portfolio/.env
          # Configs d'observabilité (fluentd/loki + provisioning et dashboards Grafana),
          # montées par la stack : elles doivent exister sur le serveur.
          scp -r $SSH_OPTS logging ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:~/portfolio/

      - name: Pull images & restart stack
        run: |
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
            set -e
            cd ~/portfolio
            echo 'Déploiement du tag: ${{ env.IMAGE_TAG }}'
            echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml down
            # On reconstruit UNIQUEMENT l'index vectoriel (test de chunk size d'un déploiement
            # à l'autre) en supprimant son seul volume, sans toucher à l'historique
            # d'observabilité (loki_data/grafana_data) ni au journal d'interactions (bind mount).
            docker volume rm portfolio_chroma_data 2>/dev/null || true
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
            docker logout ghcr.io
          "

      - name: Health check
        run: |
          sleep 15
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
            set -e
            curl -sf http://localhost:8080/ >/dev/null && echo 'Frontend OK'
            curl -sf http://localhost:8080/api/health >/dev/null && echo 'API OK'
          "
