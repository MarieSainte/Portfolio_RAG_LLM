server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA : toutes les routes inconnues renvoient index.html (routing Angular)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache long pour les assets versionnés (hash dans le nom de fichier)
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
